[[plugins]]
repo = 'osyo-manga/shabadou.vim'
on_i = 1

[[plugins]]
repo = 'jceb/vim-hier'
on_i = 1

[[plugins]]
repo = 'w0rp/ale'
on_i = 1
hook_add = 'source $XDG_CONFIG_HOME/nvim/plugins/ale.rc.vim'

