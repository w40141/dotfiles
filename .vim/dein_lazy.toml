[[plugins]]
repo = 'KazuakiM/vim-qfsigns'
on_i = 1
hook_add = '''
" If syntax error, cursor is moved at line setting sign.
let g:qfsigns#AutoJump = 1
" If syntax error,  view split and cursor is moved at line setting sign.
" let g:qfsigns#AutoJump = 2
'''

[[plugins]]
repo = 'mattn/gist-vim'
on_cmd = 'Gist'
depends = ['mattn/webapi-vim']

[[plugins]]
repo = 'gregsexton/gitv'
on_cmd = 'Gitv'
depends = ['tpope/vim-fugitive']

[[plugins]]
repo = 'jiangmiao/auto-pairs'
on_i = 1

[[plugins]]
repo = 'Shougo/neosnippet.vim'
depends = ['neosnippet-snippets', 'context_filetype.vim']
on_i = 1
hook_source = 'source $XDG_CONFIG_HOME/nvim/plugins/neosnippet.rc.vim'

[[plugins]]
repo = 'ujihisa/neco-look'
on_source = 'deoplete.nvim'
on_i = 1

