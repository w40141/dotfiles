version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - durationcheck
    - err113
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gocritic
    - gocyclo
    - gomoddirectives
    - gosec
    - govet
    - ineffassign
    - intrange
    - lll
    - makezero
    - misspell
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    gocyclo:
      min-complexity: 12
    funlen:
      lines: 80
      statements: 40
    revive:
      enable-all-rules: false
      rules:
        - name: unused-parameter
        - name: indent-error-flow
        - name: early-return
        - name: unexported-return
        - name: var-declaration
        - name: blank-imports
        - name: context-as-argument
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
    lll:
      line-length: 120
      tab-width: 1
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - funlen
          - errcheck
formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    golines:
      max-len: 120
      tab-len: 1
      shorten-comments: true
      reformat-tags: true
  exclusions:
    warn-unused: true
    generated: strict
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false
severity:
  default: error
